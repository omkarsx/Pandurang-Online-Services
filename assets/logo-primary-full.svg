<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 760" role="img" aria-labelledby="title desc">
  <title id="title">Pandurang Online Services Primary Full Logo</title>
  <desc id="desc">Refined full Pandurang Online Services brand logo with human digital figure, network arcs, service name, tagline and service categories.</desc>
  <defs>
