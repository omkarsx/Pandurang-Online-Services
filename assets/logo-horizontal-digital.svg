<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 180" role="img" aria-labelledby="title desc">
  <title id="title">Pandurang Online Services Horizontal Logo</title>
  <desc id="desc">Simplified horizontal Pandurang Online Services logo for digital headers, navbar, hero and footer use.</desc>
  <defs>
    <linearGradient id="navyGrad" x1="34" y1="144" x2="116" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07183e"/>
      <stop offset="1" stop-color="#0B1F4D"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="80" y1="16" x2="118" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FB923C"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <style>
      .brand-main{font-family:Poppins,Inter,Arial,sans-serif;font-weight:800;font-size:68px;letter-spacing:0;fill:#0B1F4D;stroke:rgba(255,255,255,.72);stroke-width:4px;paint-order:stroke fill;}
      .brand-sub{font-family:Poppins,Inter,Arial,sans-serif;font-weight:700;font-size:22px;letter-spacing:7px;fill:#F97316;}
      .brand-sub-navy{fill:#0B1F4D;stroke:rgba(255,255,255,.72);stroke-width:2px;paint-order:stroke fill;}
    </style>
  </defs>

  <g transform="translate(20 15)">
    <path d="M41 55a58 58 0 0 0-11 65" fill="none" stroke="#0B1F4D" stroke-width="6" stroke-linecap="round"/>
    <path d="M129 55a58 58 0 0 1 11 65" fill="none" stroke="#F97316" stroke-width="6" stroke-linecap="round"/>
    <path d="M48 111c12-12 20-32 24-50" fill="none" stroke="#0B1F4D" stroke-width="3" stroke-linecap="round" opacity=".7"/>
    <path d="M122 111c-12-12-20-32-24-50" fill="none" stroke="#F97316" stroke-width="3" stroke-linecap="round" opacity=".7"/>
    <circle cx="48" cy="111" r="7" fill="#0B1F4D"/>
    <circle cx="72" cy="61" r="6" fill="#0B1F4D"/>
    <circle cx="122" cy="111" r="7" fill="#F97316"/>
    <circle cx="98" cy="61" r="6" fill="#F97316"/>
    <path d="M85 8c-19 0-35 13-35 30 0 19 23 38 35 57 12-19 35-38 35-57 0-17-16-30-35-30Z" fill="url(#orangeGrad)"/>
    <circle cx="85" cy="38" r="9" fill="#fff"/>
    <path d="M60 10c15-11 35-11 50 0" fill="none" stroke="#F97316" stroke-width="7" stroke-linecap="round"/>
    <path d="M69 23c10-7 22-7 32 0" fill="none" stroke="#F97316" stroke-width="6" stroke-linecap="round"/>
    <path d="M85 74 65 94l13 15v28h14v-28l13-15-20-20Z" fill="url(#navyGrad)"/>
    <path d="m65 94-21 20 16 16 18-21" fill="none" stroke="url(#navyGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="m105 94 21 20-16 16-18-21" fill="none" stroke="url(#navyGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M85 101v35" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity=".9"/>
    <circle cx="85" cy="110" r="5" fill="#fff"/>
    <circle cx="85" cy="130" r="5" fill="#fff"/>
    <path d="M58 149h54" fill="none" stroke="#0B1F4D" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g transform="translate(185 53)">
    <text class="brand-main" x="0" y="58">Pandurang</text>
    <rect x="3" y="88" width="42" height="4" rx="2" fill="#F97316"/>
    <text class="brand-sub" x="60" y="100">ONLINE</text>
    <text class="brand-sub brand-sub-navy" x="242" y="100">SERVICES</text>
    <rect x="438" y="88" width="42" height="4" rx="2" fill="#F97316"/>
  </g>
</svg>
